<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CloudSync — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--dark:#0b0f1a;--blue:#2563eb;--blue2:#3b82f6;--light:#60a5fa;--text:#f1f5f9;--muted:#94a3b8;--border:#1e2d4a;--card:#111827;--success:#22c55e;--error:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(37,99,235,.1),transparent)}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(11,15,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Outfit',sans-serif;font-weight:700;font-size:1.2rem;color:var(--text);text-decoration:none}
.nav-logo img{width:30px;height:30px;object-fit:contain}
.nav-logo span{color:var(--light)}
.nav-right{display:flex;align-items:center;gap:16px}
.user-badge{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:7px 16px;font-size:.84rem}
.user-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),var(--light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-logout:hover{border-color:var(--error);color:#fca5a5}
.main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:100px 24px 40px}
.page-title{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:4px}
.page-sub{color:var(--muted);font-size:.88rem;margin-bottom:32px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.stat-val{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--blue2),var(--light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:4px}
.upload-box{background:var(--card);border:2px dashed var(--border);border-radius:16px;padding:40px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:24px;position:relative;overflow:hidden}
.upload-box:hover{border-color:var(--blue);background:rgba(37,99,235,.05)}
.upload-icon{font-size:2.4rem;margin-bottom:12px}
.upload-title{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:600;margin-bottom:6px}
.upload-sub{font-size:.84rem;color:var(--muted);margin-bottom:18px}
.btn-choose{background:var(--blue);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-choose:hover{background:var(--blue2)}
#fileInput{display:none}
.progress-wrap{display:none;margin-top:16px}
.progress-track{background:var(--border);border-radius:4px;height:5px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--light));border-radius:4px;transition:width .2s}
.progress-label{font-size:.76rem;color:var(--muted);margin-top:7px}
.file-section{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.file-header{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.file-header-title{font-family:'Outfit',sans-serif;font-weight:600;font-size:.95rem}
.file-count{font-size:.78rem;color:var(--muted)}
.file-item{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid rgba(30,45,74,.5);gap:12px;transition:background .2s}
.file-item:last-child{border-bottom:none}
.file-item:hover{background:rgba(37,99,235,.04)}
.file-info{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.file-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:rgba(37,99,235,.12)}
.file-name{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:.74rem;color:var(--muted);margin-top:2px}
.file-actions{display:flex;gap:6px;flex-shrink:0}
.btn-action{border:none;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.76rem;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-dl{background:rgba(34,197,94,.1);color:#86efac}.btn-dl:hover{background:rgba(34,197,94,.2)}
.btn-sh{background:rgba(37,99,235,.12);color:var(--light)}.btn-sh:hover{background:rgba(37,99,235,.25)}
.btn-rm{background:rgba(239,68,68,.1);color:#fca5a5}.btn-rm:hover{background:rgba(239,68,68,.2)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:2.8rem;margin-bottom:12px;opacity:.5}
#toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);padding:11px 24px;border-radius:20px;font-size:.84rem;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:420px;max-width:95vw}
.modal h2{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:600;margin-bottom:6px}
.modal p{font-size:.84rem;color:var(--muted);margin-bottom:16px}
.link-box{background:var(--dark);border:1px solid var(--border);border-radius:9px;padding:11px 14px;font-size:.78rem;color:var(--light);word-break:break-all;margin-bottom:18px;cursor:pointer}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-modal-copy{background:var(--blue);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.btn-modal-copy:hover{background:var(--blue2)}
.btn-modal-close{background:transparent;color:var(--muted);border:1px solid var(--border);padding:9px 18px;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-modal-close:hover{border-color:var(--muted);color:var(--text)}
@media(max-width:600px){nav{padding:14px 16px}.main{padding:90px 16px 30px}.stats-row{grid-template-columns:1fr 1fr}.file-actions{flex-direction:column}}
</style>
</head>
<body>
<div class="bg-glow"></div>

<nav>
  <a href="index.html" class="nav-logo"><img src="assets/CloudSync_logo.png" alt=""/>Cloud<span>Sync</span></a>
  <div class="nav-right">
    <div class="user-badge">
      <div class="user-avatar" id="userAvatar">U</div>
      <span id="userName">User</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="main">
  <div class="page-title">My Dashboard</div>
  <div class="page-sub" id="welcomeMsg">Welcome back! Manage your files below.</div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Files</div><div class="stat-val" id="statFiles">0</div></div>
    <div class="stat-card"><div class="stat-label">Total Size</div><div class="stat-val" id="statSize">0 B</div></div>
    <div class="stat-card"><div class="stat-label">Storage</div><div class="stat-val">AWS S3</div></div>
  </div>

  <!-- UPLOAD -->
  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">☁️</div>
    <div class="upload-title">Click to upload a file</div>
    <div class="upload-sub">Stored securely in your AWS S3 bucket</div>
    <button class="btn-choose" onclick="event.stopPropagation();document.getElementById('fileInput').click()">Choose File</button>
    <input type="file" id="fileInput" onchange="uploadFile(event)"/>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-label" id="progressLabel">Uploading...</div>
    </div>
  </div>

  <!-- FILE LIST -->
  <div class="file-section">
    <div class="file-header">
      <div class="file-header-title">📂 Your Files</div>
      <div class="file-count" id="fileCountLabel">0 files</div>
    </div>
    <div id="fileListBody">
      <div class="empty"><div class="empty-icon">📭</div>No files yet. Upload one above!</div>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="overlay" id="shareOverlay">
  <div class="modal">
    <h2>🔗 Share File</h2>
    <p id="shareFileName"></p>
    <div class="link-box" id="shareLink" onclick="copyLink()"></div>
    <div class="modal-btns">
      <button class="btn-modal-close" onclick="closeModal()">Close</button>
      <button class="btn-modal-copy" onclick="copyLink()">📋 Copy Link</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
<script>
  const API       = "https://hfj7jltm72.execute-api.ap-south-1.amazonaws.com/prod";
  const BUCKET    = "cloudsync-private";
  const POOL_ID   = "ap-south-1_6iKQMwlTH";
  const CLIENT_ID = "73umbpeoge4mi5034466n4ig5f";

  const token = sessionStorage.getItem('csToken');
  const userName = sessionStorage.getItem('csUser') || 'User';
  const userEmail = sessionStorage.getItem('csEmail') || '';
  if (!token) window.location.href = 'login.html';

  document.getElementById('userName').textContent = userName.split(' ')[0];
  document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
  document.getElementById('welcomeMsg').textContent = `Welcome back, ${userName.split(' ')[0]}! Manage your files below.`;

  let files = [];

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
  }

  function totalSize() {
    const t = files.reduce((s,f) => s + f.size, 0);
    return formatSize(t);
  }

  function getIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (['png','jpg','jpeg','gif','webp'].includes(ext)) return '🖼️';
    if (ext === 'pdf') return '📄';
    if (['doc','docx','txt'].includes(ext)) return '📝';
    if (['zip','rar'].includes(ext)) return '🗜️';
    if (['mp4','mov','avi'].includes(ext)) return '🎬';
    if (['mp3','wav'].includes(ext)) return '🎵';
    return '📁';
  }

  async function uploadFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    const wrap = document.getElementById('progressWrap');
    const bar  = document.getElementById('progressBar');
    const lbl  = document.getElementById('progressLabel');
    wrap.style.display = 'block';
    bar.style.width = '20%';
    lbl.textContent = 'Getting upload URL...';
    try {
      const res = await fetch(`${API}/upload`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileName: file.name, fileType: file.type, fileSize: file.size, userEmail: userEmail, bucket: BUCKET })
      });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const data = await res.json();
      const url = data.url || (data.body ? JSON.parse(data.body).url : undefined);
      if (!url) throw new Error('No URL returned');
      bar.style.width = '60%';
      lbl.textContent = 'Uploading to S3...';
      const s3res = await fetch(url, { method: 'PUT', headers: { 'Content-Type': file.type }, body: file });
      if (!s3res.ok) throw new Error('S3 upload failed');
      bar.style.width = '100%';
      lbl.textContent = 'Upload complete! ✅';
      await loadFiles();
      showToast('✅ File uploaded successfully!');
    } catch (err) {
      showToast('❌ Upload failed: ' + err.message, true);
      console.error(err);
    }
    setTimeout(() => { wrap.style.display = 'none'; bar.style.width = '0%'; }, 2000);
  }

  async function downloadFile(fileId) {
    showToast('⬇️ Getting download link...');
    try {
      const res = await fetch(`${API}/download?fileId=${encodeURIComponent(fileId)}`);
      const data = await res.json();
      const url = data.url || (data.body ? JSON.parse(data.body).url : undefined);
      if (!url) throw new Error('No URL');
      window.open(url, '_blank');
      showToast('✅ Download started!');
    } catch (err) { showToast('❌ Download failed.', true); }
  }

  async function deleteFile(fileId, fileName) {
    if (!confirm(`Delete "${fileName}"?`)) return;
    showToast('🗑️ Deleting...');
    try {
      await fetch(`${API}/delete?fileId=${encodeURIComponent(fileId)}`, { method: 'DELETE' });
      files = files.filter(f => f.fileId !== fileId);
      render();
      showToast('✅ File deleted!');
    } catch (err) { showToast('❌ Delete failed.', true); }
  }

  async function shareFile(fileId, fileName) {
    showToast('🔗 Generating link...');
    try {
      const res = await fetch(`${API}/download?fileId=${encodeURIComponent(fileId)}`);
      const data = await res.json();
      const url = data.url || (data.body ? JSON.parse(data.body).url : undefined);
      if (!url) throw new Error('No URL');
      document.getElementById('shareFileName').textContent = fileName;
      document.getElementById('shareLink').textContent = url;
      document.getElementById('shareOverlay').classList.add('open');
    } catch (err) { showToast('❌ Could not generate share link.', true); }
  }

  function closeModal() { document.getElementById('shareOverlay').classList.remove('open'); }

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById('shareLink').textContent).catch(()=>{});
    showToast('📋 Link copied!');
    closeModal();
  }

  function render() {
    document.getElementById('statFiles').textContent = files.length;
    document.getElementById('statSize').textContent  = totalSize();
    document.getElementById('fileCountLabel').textContent = files.length + ' file' + (files.length !== 1 ? 's' : '');
    const body = document.getElementById('fileListBody');
    if (files.length === 0) {
      body.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>No files yet. Upload one above!</div>`;
      return;
    }
    body.innerHTML = files.map(f => `
      <div class="file-item">
        <div class="file-info">
          <div class="file-icon">${getIcon(f.name)}</div>
          <div>
            <div class="file-name">${f.name}</div>
            <div class="file-meta">${formatSize(f.size)} · ${f.date ? f.date.toLocaleDateString() : 'Just now'}</div>
          </div>
        </div>
        <div class="file-actions">
          <button class="btn-action btn-dl" onclick="downloadFile('${f.fileId}')">⬇ Download</button>
          <button class="btn-action btn-sh" onclick="shareFile('${f.fileId}','${f.name}')">🔗 Share</button>
          <button class="btn-action btn-rm" onclick="deleteFile('${f.fileId}','${f.name}')">🗑 Delete</button>
        </div>
      </div>`).join('');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = isError ? 'rgba(239,68,68,.4)' : 'var(--border)';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2600);
  }

  function logout() {
    sessionStorage.clear();
    window.location.href = 'login.html';
  }

  document.getElementById('shareOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  async function loadFiles() {
    try {
      const res = await fetch(`${API}/list?userEmail=${encodeURIComponent(userEmail)}`);
      const data = await res.json();
      const parsed = data.files || (data.body ? JSON.parse(data.body).files : []);
      files = parsed.map(f => ({
        fileId: f.fileId,
        name:   f.fileName,
        size:   f.fileSize,
        date:   f.uploadedAt ? new Date(f.uploadedAt) : null,
      }));
      render();
    } catch (err) {
      console.error('Could not load files:', err);
    }
  }

  loadFiles();
</script>
<script src="cloudsync-bot.js"></script>
</body>
</html>
